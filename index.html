<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSU SSSNPWD Office — Supply Inventory System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* Your original CSS goes here */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --maroon:#7B1D1D;--maroon-dark:#5A1212;--maroon-mid:#9B3030;
  --maroon-light:#F5ECEC;--maroon-pale:#FDF7F7;
  --gold:#C9922A;--gold-light:#F5DFA0;
  --text:#1A1A1A;--text-2:#555;--text-3:#888;
  --border:#E8E0E0;--border-2:#D4C8C8;--white:#fff;
  --ok:#1A6B3A;--ok-bg:#E6F4EC;
  --warn:#7A5000;--warn-bg:#FEF3D0;
  --danger:#8B1A1A;--danger-bg:#FDECEA;
  --radius:10px;--radius-lg:16px;--bg:#F0E8E8;
}
html,body{min-height:100vh}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
/* ... rest of your CSS unchanged ... */
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" style="position:fixed;inset:0;background:#F0E8E8;display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:white;padding:30px;border-radius:12px;width:320px;border:1px solid #ddd;">
    <h2 style="margin-bottom:15px;color:#7B1D1D;">Login</h2>
    <input type="email" id="email" placeholder="Email" style="width:100%;padding:10px;margin-bottom:10px;">
    <input type="password" id="password" placeholder="Password" style="width:100%;padding:10px;margin-bottom:15px;">
    <button onclick="login()" style="width:100%;padding:10px;background:#7B1D1D;color:white;border:none;border-radius:6px;">Login</button>
    <p id="login-error" style="color:red;font-size:12px;margin-top:10px;"></p>
  </div>
</div>

<!-- Loading screen -->
<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <p>Connecting to database…</p>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="seal">
      <img src="bsu-logo.png" alt="Batangas State University Logo">
    </div>
    <div class="htext">
      <div class="h-univ">Batangas State University</div>
      <div class="h-office">Services for Students with Special Needs and Persons with Disabilities</div>
      <span class="h-badge">SSSNPWD Office</span>
    </div>
  </div>
  <div class="header-sub">
    <div class="header-sub-inner">
      <span class="hs-title">Supply Inventory &amp; Monitoring System</span>
      <div class="hs-right">
        <span class="hs-date" id="hdate"></span>
        <span><span class="sync-dot" id="sync-dot"></span><span class="sync-label" id="sync-label">Connected</span></span>
      </div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div class="main" id="app-main" style="display:none">
  <div class="stat-row" id="stats"></div>
  <div id="alert-area"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('inv',this)">Inventory</button>
    <button class="tab" onclick="switchTab('log',this)">Activity Log</button>
  </div>
  <div id="tab-inv">
    <div class="toolbar">
      <div class="sw"><span class="sw-icon">🔍</span><input type="text" id="search" placeholder="Search supplies…" oninput="render()"></div>
      <select id="cf" onchange="render()">
        <option value="">All categories</option>
        <option>Office supplies</option>
        <option>Paper &amp; printing</option>
        <option>Assistive materials</option>
        <option>Cleaning supplies</option>
      </select>
      <button class="btn btn-primary" onclick="openAddModal()">Add Item</button>
    </div>
    <div class="table-wrap" style="overflow-x:auto;">
      <table>
        <thead>
          <tr><th>Item</th><th>Category</th><th>Quantity</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="inv-body"></tbody>
      </table>
    </div>
  </div>
  <div id="tab-log" style="display:none">
    <div class="log-wrap" id="log-body"></div>
  </div>
</div>

<div class="footer">© 2026 SSSNPWD Office — Batangas State University</div>

<script>
// Supabase config
const SUPA_URL = 'https://ukwtlomhykasmufybjvk.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVrd3Rsb21oeWthc211ZnlianZrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0OTc1ODQsImV4cCI6MjA5MDA3MzU4NH0.M-TlY_WqeLmQSISAoWJgJKhZlW3rqRnCZNI_ReqLDZM';
const supabase = supabase.createClient(SUPA_URL, SUPA_KEY);

// Auto-update date
document.getElementById('hdate').textContent = new Date().toLocaleString();

// Login function
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if(error){
    document.getElementById('login-error').textContent = error.message;
  } else {
    document.getElementById('login-screen').style.display = 'none';
    startApp();
  }
}

// Auto-login if session exists
window.addEventListener('DOMContentLoaded', async () => {
  const { data } = await supabase.auth.getSession();
  if(data.session){
    document.getElementById('login-screen').style.display = 'none';
    startApp();
  }
});

// Tab switching
function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-inv').style.display = tab==='inv'?'block':'none';
  document.getElementById('tab-log').style.display = tab==='log'?'block':'none';
}

// Dummy functions for rendering
async function startApp(){
  document.getElementById('loading').style.display='flex';
  setTimeout(()=>{document.getElementById('loading').style.display='none';render();},500);
}

function render(){
  const body = document.getElementById('inv-body');
  body.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;">No items yet</td></tr>';
  const log = document.getElementById('log-body');
  log.innerHTML = '<div class="empty">No activity yet</div>';
}

// Placeholder for add modal
function openAddModal(){alert('Add item modal would open');}
</script>

</body>
</html>
